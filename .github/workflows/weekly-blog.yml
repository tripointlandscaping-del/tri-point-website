name: Weekly Blog Posts

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9am UTC
  workflow_dispatch: # Allow manual trigger from GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate 2 new blog posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-posts.mjs

      - name: Commit and push new posts
        run: |
          git config user.name "Tri-Point Blog Bot"
          git config user.email "tripointlandscaping@gmail.com"
          git add app/blog/posts.ts
          git diff --staged --quiet || git commit -m "Add 2 new blog posts - $(date +'%B %d, %Y')"
          git push
