name: Weekly Blog Posts

on:
  schedule:
    - cron: "0 14 * * 2" # Tuesday 9am EST (14:00 UTC)
    - cron: "0 14 * * 4" # Thursday 9am EST (14:00 UTC)
  workflow_dispatch: # Allow manual trigger from GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate new blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-posts.mjs

      - name: Commit and push new post
        continue-on-error: true
        run: |
          git config user.name "Tri-Point Blog Bot"
          git config user.email "tripointlandscaping@gmail.com"
          git add app/blog/posts.ts
          if git diff --staged --quiet; then
            echo "No new post to commit"
            exit 0
          fi
          git commit -m "Add new blog post - $(date +'%B %d, %Y')"
          git pull --rebase origin main || true
          git push

      - name: Ping Google and Bing with updated sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://tripointlandscaping.com/sitemap.xml" \
            && echo "✅ Google pinged" || echo "⚠️ Google ping failed (non-fatal)"
          curl -s "https://www.bing.com/ping?sitemap=https://tripointlandscaping.com/sitemap.xml" \
            && echo "✅ Bing pinged" || echo "⚠️ Bing ping failed (non-fatal)"

      - name: Request Google indexing for new post
        continue-on-error: true
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: node scripts/request-indexing.mjs

      - name: Post to Facebook and Instagram
        continue-on-error: true
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: node scripts/post-to-social.mjs
