name: Weekly Blog Posts

on:
  schedule:
    - cron: "0 14 * * 2" # Tuesday 9am EST (14:00 UTC)
    - cron: "0 14 * * 4" # Thursday 9am EST (14:00 UTC)
  workflow_dispatch: # Allow manual trigger from GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate new blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-posts.mjs

      - name: Commit and push new post
        run: |
          git config user.name "Tri-Point Blog Bot"
          git config user.email "tripointlandscaping@gmail.com"
          git add app/blog/posts.ts
          git diff --staged --quiet || git commit -m "Add new blog post - $(date +'%B %d, %Y')"
          git push
